name: Run Setup Script

on:
  push:
    branches:
      - main  # Trigger on pushes to the main branch

jobs:
  bitcoin-setup:
    runs-on: ubuntu-latest  # Use the latest Ubuntu environment

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6  # Check out the repository code
          
      - name: Setup, Get Block & Verify Submissions
        run: |
          # Setup Bitcoin Core
          wget https://bitcoincore.org/bin/bitcoin-core-28.0/bitcoin-28.0-x86_64-linux-gnu.tar.gz
          tar -xzvf bitcoin-28.0-x86_64-linux-gnu.tar.gz
          sudo ln -s $PWD/bitcoin-28.0/bin/* /usr/local/bin/

          mkdir -p ~/.bitcoin
          echo "signet=1" >> ~/.bitcoin/bitcoin.conf
          echo "rpcconnect=161.35.161.124" >> ~/.bitcoin/bitcoin.conf
          echo "rpcuser=btrustbuildersrpc" >> ~/.bitcoin/bitcoin.conf
          echo "rpcpassword=btrustbuilderspass" >> ~/.bitcoin/bitcoin.conf

          # Verify block is accessible
          echo "Fetching block chain info..."
          bitcoin-cli -signet getblockchaininfo

          # --- grading helpers: hash commitments ---
          actual_sha() { printf '%s' "$1" | sha256sum | awk '{print $1}'; }
          EXPECTED_01_SHA=bde2baff59ce5e0af3bce4de819074e8543eaac9258177d4f5308736fb29ce4d
          EXPECTED_02_SHA=5627b4a8f9efbd8fbdadaf4177824186f8c734f320935c88e926bc027af6c50f
          EXPECTED_03_SHA=271adcc6544021004ef18d63e0ab2971e616b6da698de007cc02531eb169b127
          EXPECTED_04_SHA=8a7790effbf72c4952d9338be95ec6d8911028aaa1f0b3115e0996581d1dec94
          EXPECTED_05_SHA=677fe64a8ea7e98a420d129f1cf3d4d23a9f107e9fbe8d83efe95f093001cd54
          EXPECTED_06_SHA=3fdc1bbf0f9de58ee6e32ab8974faaa4aa803fd025afae36a49126849a14d7a1
          EXPECTED_07_SHA=917c00c7e09c9172665a0c6f6a36e92ffae6ad0cc581b805b590d2b932cc3795
          EXPECTED_08_SHA=a73116285d9ff195341d1fab25e55c595e7e71296b4820b4a377847e9ef90647

          # Run and verify 01.sh
          chmod +x submission/01.sh
          HASH=$(submission/01.sh)
          if [[ "$(actual_sha "$HASH")" == "$EXPECTED_01_SHA" ]]; then
            echo "✅ Success: Verify Hash Block passed!"
          else
            echo "❌ Error: Verify Hash Block failed!"
            exit 1
          fi

          # 02.sh - Verify Input Count
          chmod +x submission/02.sh
          COUNT=$(submission/02.sh)
          if [[ "$(actual_sha "$COUNT")" == "$EXPECTED_02_SHA" ]]; then
            echo "✅ Success: Input Count verification passed!"
          else
            echo "❌ Error: Input Count verification failed!"
            exit 1
          fi

          # 03.sh - Verify Transaction
          chmod +x submission/03.sh
          TX=$(submission/03.sh)
          if [[ "$(actual_sha "$TX")" == "$EXPECTED_03_SHA" ]]; then
            echo "✅ Success: Transaction verification passed!"
          else
            echo "❌ Error: Transaction verification failed!"
            exit 1
          fi

          # 04.sh - Verify Public Key Signer
          chmod +x submission/04.sh
          PUBKEY=$(submission/04.sh)
          if [[ "$(actual_sha "$PUBKEY")" == "$EXPECTED_04_SHA" ]]; then
            echo "✅ Success: Public Key Signer verification passed!"
          else
            echo "❌ Error: Public Key Signer verification failed!"
            exit 1
          fi

          # 05.sh - Verify TX Fee
          chmod +x submission/05.sh
          FEE=$(submission/05.sh)
          if [[ "$(actual_sha "$FEE")" == "$EXPECTED_05_SHA" ]]; then
            echo "✅ Success: TX Fee verification passed!"
          else
            echo "❌ Error: TX Fee verification failed!"
            exit 1
          fi

          # 06.sh - Verify TX ID opt-in RBF
          chmod +x submission/06.sh
          TXID=$(submission/06.sh)
          if [[ "$(actual_sha "$TXID")" == "$EXPECTED_06_SHA" ]]; then
            echo "✅ Success: TX ID opt-in RBF verification passed!"
          else
            echo "❌ Error: TX ID opt-in RBF verification failed!"
            exit 1
          fi

          # 07.sh - Verify Coinbase TX
          chmod +x submission/07.sh
          COINBASE=$(submission/07.sh | tr -d '\n' | xargs)
          if [[ "$(actual_sha "$COINBASE")" == "$EXPECTED_07_SHA" ]]; then
            echo "✅ Success: Coinbase TX verification passed!"
          else
            echo "❌ Error: Coinbase TX verification failed!"
            exit 1
          fi

          # 08.sh - Verify TX Block Height
          chmod +x submission/08.sh
          HEIGHT=$(submission/08.sh)
          if [[ "$(actual_sha "$HEIGHT")" == "$EXPECTED_08_SHA" ]]; then
            echo "✅ Success: TX Block Height verification passed!"
          else
            echo "❌ Error: TX Block Height verification failed!"
            exit 1
          fi


          ## FINAL TASK

          # Read wallet name and verify GitHub profile
          if [ ! -s submission/wallet.txt ]; then
              echo "❌ Error: wallet.txt is empty or missing."
              exit 1
          fi

          WALLET=$(cat submission/wallet.txt | tr -d '\n')
          echo "wallet=$WALLET" >> $GITHUB_OUTPUT
      
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://github.com/$WALLET)
          if [[ "$STATUS_CODE" == "200" ]]; then
            echo "✅ GitHub profile exists: https://github.com/$WALLET"
          else
            echo "❌ GitHub profile not found for wallet name '$WALLET'"
            exit 1
          fi

          # Verify descriptor.txt is valid
          if [[ ! -s submission/descriptor.txt ]]; then
              echo "❌ Error: descriptor.txt is empty or missing."
              exit 1
          fi
          DESC=$(cat submission/descriptor.txt | tr -d '\n')
          DESC_INFO=$(bitcoin-cli -signet getdescriptorinfo "$DESC" 2>/dev/null) || true
          if [[ -z "$DESC_INFO" ]]; then
            echo "❌ descriptor.txt could not be validated."
            exit 1
          fi
          DESC_VALID=$(echo "$DESC_INFO" | jq -r '.issolvable')
          if [[ "$DESC_VALID" == "true" ]]; then
            echo "✅ Descriptor is valid."
          else
            echo "❌ Descriptor is not valid."
            exit 1
          fi

          # Verify descriptor can derive at least one tb1 address
          DESC_CHECKSUM=$(echo "$DESC_INFO" | jq -r '.descriptor')
          DESC_ADDR=$(bitcoin-cli -signet deriveaddresses "$DESC_CHECKSUM" "[0,0]" | jq -r '.[0]')
          if [[ "$DESC_ADDR" == "tb1"* ]]; then
            echo "✅ Descriptor derives a valid signet address: $DESC_ADDR"
          else
            echo "❌ Descriptor does not derive a valid signet address."
            exit 1
          fi

          # Verify native SegWit address exists
          if [ ! -s submission/address.txt ]; then
              echo "❌ Error: address.txt is empty or missing."
              exit 1
          fi

          ADDRESS=$(cat submission/address.txt)
          if [[ $ADDRESS == "tb1"* ]]; then
            echo "✅ Native SegWit address is valid: $ADDRESS"
          else
            echo "❌ Invalid SegWit address: $ADDRESS"
            exit 1
          fi

          # Verify transaction-1.txt (funding tx)
          if [[ ! -s submission/transaction-1.txt ]]; then
              echo "❌ Error: transaction-1.txt is empty or missing."
              exit 1
          fi
          TX1=$(cat submission/transaction-1.txt)
          EX=$(bitcoin-cli -signet getrawtransaction "$TX1" true | jq --arg addr "$ADDRESS" '.vout[] | select(.scriptPubKey.address == $addr)')
          if [[ -n "$EX" ]]; then
              echo "✅ Funding transaction exists: $TX1"
          else
              echo "❌ Funding transaction not found: $TX1"
              exit 1
          fi

          # Verify block-1.txt
          if [[ ! -s submission/block-1.txt ]]; then
              echo "❌ Error: block-1.txt is empty or missing."
              exit 1
          fi
          BLOCK1=$(cat submission/block-1.txt | tr -d '\n')
          TXS1=$(bitcoin-cli -signet getblock $BLOCK1 | jq -r '.tx[]')
          if echo "$TXS1" | grep -xq "$TX1"; then
              echo "✅ transaction-1 is included in block-1."
          else
              echo "❌ transaction-1 not found in block-1."
              exit 1
          fi

          # Verify coinbase-1.txt
          if [[ ! -s submission/coinbase-1.txt ]]; then
              echo "❌ Error: coinbase-1.txt is empty or missing."
              exit 1
          fi
          COINBASE1=$(cat submission/coinbase-1.txt)
          EXP=$(bitcoin-cli -signet getblock $BLOCK1 | jq -r '.tx[0]')
          if echo "$EXP" | grep -xq "$COINBASE1"; then
            echo "✅ Coinbase-1 matches the first transaction in block-1"
          else
            echo "❌ Coinbase-1 does not match"
            exit 1
          fi

          # Verify transaction-2.txt (spend tx)
          if [[ ! -s submission/transaction-2.txt ]]; then
              echo "❌ Error: transaction-2.txt is empty or missing."
              exit 1
          fi
          TX2=$(cat submission/transaction-2.txt)
          TX2_DETAILS=$(bitcoin-cli -signet getrawtransaction $TX2 true)
          AMOUNT_SENT=$(echo $TX2_DETAILS | jq -r ".vout[] | select(.scriptPubKey.address==\"tb1qddpcyus3u603n63lk7m5epjllgexc24vj5ltp7\") | .value")
          if [[ "$AMOUNT_SENT" == "0.00010000" ]]; then
              echo "✅ Sent exactly 10,000 sats."
          else
              echo "❌ Did not send exactly 10,000 sats."
              exit 1
          fi

          # Verify fee
          TX2_META=$(bitcoin-cli -signet -rpcwallet=$WALLET gettransaction $TX2)
          FEE=$(echo $TX2_META | jq -r '.fee' | awk '{print int(-100000000 * $1)}')
          if [[ "$FEE" -eq 700 ]]; then
              echo "✅ Fee is exactly 700 sats."
          else
              echo "❌ Incorrect fee: $FEE sats."
              exit 1
          fi

          # Verify Transaction fee can be upgraded
          HEX=$(echo $TX2_META | jq -r '.hex')
          SE=$(bitcoin-cli -signet decoderawtransaction $HEX | jq -r '.vin[0].sequence')
          if [[ -n "$SE" && "$SE" =~ ^[0-9]+$ && "$SE" -lt 4294967294 ]]; then
              echo "✅ Transaction is BIP125 replaceable."
          else
              echo "❌ Transaction is not BIP125 replaceable."
              exit 1
          fi

          # Verify block-2.txt
          if [[ ! -s submission/block-2.txt ]]; then
              echo "❌ Error: block-2.txt is empty or missing."
              exit 1
          fi
          BLOCK2=$(cat submission/block-2.txt | tr -d '\n')
          TXS2=$(bitcoin-cli -signet getblock $BLOCK2 | jq -r '.tx[]')
          if echo "$TXS2" | grep -xq "$TX2"; then
              echo "✅ transaction-2 is included in block-2."
          else
              echo "❌ transaction-2 not found in block-2."
              exit 1
          fi

          # Verify coinbase-2.txt
          if [[ ! -s submission/coinbase-2.txt ]]; then
              echo "❌ Error: coinbase-2.txt is empty or missing."
              exit 1
          fi
          COINBASE2=$(cat submission/coinbase-2.txt)
          EXP2=$(bitcoin-cli -signet getblock $BLOCK2 | jq -r '.tx[0]')
          if echo "$EXP2" | grep -xq "$COINBASE2"; then
            echo "✅ Coinbase-2 matches the first transaction in block-2"
          else
            echo "❌ Coinbase-2 does not match"
            exit 1
          fi


          # Verify multisig address
          if [[ ! -s submission/multisig-address.txt ]]; then
              echo "❌ Error: multisig-address.txt is empty or missing."
              exit 1
          fi
          ADDRESS=$(cat submission/multisig-address.txt)
          if [[ $ADDRESS == "2"* ]]; then
            echo "✅ Multisig address look valid."
          else
            echo "❌ Invalid multisig address"
            exit 1
          fi

          # Verify multisig redeem script
          if [[ ! -s submission/multisig-redeem.txt ]]; then
              echo "❌ Error: multisig-redeem.txt is empty or missing."
              exit 1
          fi
          REDEEM=$(cat submission/multisig-redeem.txt)
          if [[ $REDEEM =~ ^[0-9a-fA-F]+$ ]]; then
            echo "✅ Multisig redeem script look valid."
          else
            echo "❌ Invalid multisig redeem script"
            exit 1
          fi

          # Verify multisig transaction
          if [[ ! -s submission/multisig-transaction.txt ]]; then
              echo "❌ Error: multisig-transaction.txt is empty or missing."
              exit 1
          fi
          MU_TXID=$(cat submission/multisig-transaction.txt)
          R=$(bitcoin-cli -signet getrawtransaction "$MU_TXID" true | jq --arg addr "$ADDRESS" '.vout[] | select(.scriptPubKey.address == $addr)')
          if [[ -n "$R" ]]; then
              echo "✅ Multisig Funding transaction exists: $MU_TXID"
          else
              echo "❌ Multisig Funding transaction not found: $MU_TXID"
              exit 1
          fi

          # Verify multisig-block.txt
          if [[ ! -s submission/multisig-block.txt ]]; then
              echo "❌ Error: bmultisig-block.txt is empty or missing."
              exit 1
          fi
          MU_BLOCK=$(cat submission/multisig-block.txt | tr -d '\n')
          MU_TXS=$(bitcoin-cli -signet getblock $MU_BLOCK | jq -r '.tx[]')
          if echo "$MU_TXS" | grep -xq "$MU_TXID"; then
              echo "✅ multisig transaction is included in multisig block."
          else
              echo "❌ multisig transaction not found in multisig block."
              exit 1
          fi

          # Verify multisig-coinbase.txt
          if [[ ! -s submission/multisig-coinbase.txt ]]; then
              echo "❌ Error: multisig-coinbase.txt is empty or missing."
              exit 1
          fi
          MU_COINBASE=$(cat submission/multisig-coinbase.txt)
          FIRST=$(bitcoin-cli -signet getblock $MU_BLOCK | jq -r '.tx[0]')
          if echo "$FIRST" | grep -xq "$MU_COINBASE"; then
            echo "✅ multisig-coinbase matches the first transaction."
          else
            echo "❌ multisig-coinbase does not match."
            exit 1
          fi


          ## TASK 6 — PSBT

          # Verify psbt.txt exists and is valid PSBT
          if [[ ! -s submission/psbt.txt ]]; then
              echo "❌ Error: psbt.txt is empty or missing."
              exit 1
          fi
          PSBT_BASE64=$(cat submission/psbt.txt | tr -d '\n')
          PSBT_DECODED=$(bitcoin-cli -signet decodepsbt "$PSBT_BASE64" 2>/dev/null) || true
          if [[ -n "$PSBT_DECODED" ]]; then
            echo "✅ psbt.txt contains a valid PSBT."
          else
            echo "❌ psbt.txt does not contain a valid PSBT."
            exit 1
          fi

          # Verify PSBT has output paying 5,000 sats to the target address
          PSBT_TARGET=$(echo "$PSBT_DECODED" | jq -r '.tx.vout[] | select(.scriptPubKey.address=="tb1qddpcyus3u603n63lk7m5epjllgexc24vj5ltp7") | .value')
          if [[ "$PSBT_TARGET" == "0.00005000" ]]; then
            echo "✅ PSBT pays exactly 5,000 sats to target address."
          else
            echo "❌ PSBT does not pay 5,000 sats to target address."
            exit 1
          fi

          # Verify psbt-tx.txt exists and tx is confirmed on signet
          if [[ ! -s submission/psbt-tx.txt ]]; then
              echo "❌ Error: psbt-tx.txt is empty or missing."
              exit 1
          fi
          PSBT_TXID=$(cat submission/psbt-tx.txt | tr -d '\n')
          PSBT_TX_DETAILS=$(bitcoin-cli -signet getrawtransaction "$PSBT_TXID" true 2>/dev/null) || true
          if [[ -n "$PSBT_TX_DETAILS" ]]; then
            echo "✅ PSBT transaction exists on signet: $PSBT_TXID"
          else
            echo "❌ PSBT transaction not found on signet: $PSBT_TXID"
            exit 1
          fi

          # Verify the broadcast tx pays 5,000 sats to target
          PSBT_TX_AMOUNT=$(echo "$PSBT_TX_DETAILS" | jq -r '.vout[] | select(.scriptPubKey.address=="tb1qddpcyus3u603n63lk7m5epjllgexc24vj5ltp7") | .value')
          if [[ "$PSBT_TX_AMOUNT" == "0.00005000" ]]; then
            echo "✅ Broadcast PSBT transaction pays exactly 5,000 sats to target."
          else
            echo "❌ Broadcast PSBT transaction does not pay 5,000 sats to target."
            exit 1
          fi


          ## TASK 7 — P2WSH MULTISIG

          # Verify p2wsh-address.txt
          if [[ ! -s submission/p2wsh-address.txt ]]; then
              echo "❌ Error: p2wsh-address.txt is empty or missing."
              exit 1
          fi
          P2WSH_ADDR=$(cat submission/p2wsh-address.txt | tr -d '\n')
          if [[ "$P2WSH_ADDR" == "tb1q"* ]]; then
            echo "✅ P2WSH address is native SegWit: $P2WSH_ADDR"
          else
            echo "❌ P2WSH address does not start with tb1q: $P2WSH_ADDR"
            exit 1
          fi

          # Verify p2wsh-witness-script.txt is valid hex
          if [[ ! -s submission/p2wsh-witness-script.txt ]]; then
              echo "❌ Error: p2wsh-witness-script.txt is empty or missing."
              exit 1
          fi
          P2WSH_SCRIPT=$(cat submission/p2wsh-witness-script.txt | tr -d '\n')
          if [[ "$P2WSH_SCRIPT" =~ ^[0-9a-fA-F]+$ ]]; then
            echo "✅ P2WSH witness script is valid hex."
          else
            echo "❌ P2WSH witness script is not valid hex."
            exit 1
          fi

          # Verify p2wsh-funding-tx.txt exists on signet and pays to the P2WSH address
          if [[ ! -s submission/p2wsh-funding-tx.txt ]]; then
              echo "❌ Error: p2wsh-funding-tx.txt is empty or missing."
              exit 1
          fi
          P2WSH_TXID=$(cat submission/p2wsh-funding-tx.txt | tr -d '\n')
          P2WSH_TX=$(bitcoin-cli -signet getrawtransaction "$P2WSH_TXID" true 2>/dev/null) || true
          if [[ -z "$P2WSH_TX" ]]; then
            echo "❌ P2WSH funding transaction not found on signet: $P2WSH_TXID"
            exit 1
          fi
          P2WSH_MATCH=$(echo "$P2WSH_TX" | jq --arg addr "$P2WSH_ADDR" '.vout[] | select(.scriptPubKey.address == $addr)')
          if [[ -n "$P2WSH_MATCH" ]]; then
            echo "✅ P2WSH funding transaction pays to the P2WSH address."
          else
            echo "❌ P2WSH funding transaction does not pay to the P2WSH address."
            exit 1
          fi


          ## TASK 8 — OP_RETURN

          # Verify opreturn-tx.txt exists on signet
          if [[ ! -s submission/opreturn-tx.txt ]]; then
              echo "❌ Error: opreturn-tx.txt is empty or missing."
              exit 1
          fi
          OPRETURN_TXID=$(cat submission/opreturn-tx.txt | tr -d '\n')
          OPRETURN_TX=$(bitcoin-cli -signet getrawtransaction "$OPRETURN_TXID" true 2>/dev/null) || true
          if [[ -z "$OPRETURN_TX" ]]; then
            echo "❌ OP_RETURN transaction not found on signet: $OPRETURN_TXID"
            exit 1
          fi
          echo "✅ OP_RETURN transaction exists on signet: $OPRETURN_TXID"

          # Verify tx has a nulldata output
          OPRETURN_HEX=$(echo "$OPRETURN_TX" | jq -r '.vout[] | select(.scriptPubKey.type=="nulldata") | .scriptPubKey.hex')
          if [[ -z "$OPRETURN_HEX" ]]; then
            echo "❌ Transaction does not contain an OP_RETURN output."
            exit 1
          fi
          echo "✅ Transaction contains an OP_RETURN output."

          # Verify the OP_RETURN data matches the student's GitHub username
          OPRETURN_DATA=$(echo "$OPRETURN_HEX" | sed 's/^6a//' | sed 's/^..//')
          OPRETURN_DECODED=$(echo "$OPRETURN_DATA" | xxd -r -p)
          EXPECTED_OPRETURN_SHA=$(printf '%s' "$WALLET" | sha256sum | awk '{print $1}')
          ACTUAL_OPRETURN_SHA=$(printf '%s' "$OPRETURN_DECODED" | sha256sum | awk '{print $1}')
          if [[ "$ACTUAL_OPRETURN_SHA" == "$EXPECTED_OPRETURN_SHA" ]]; then
            echo "✅ OP_RETURN data matches GitHub username."
          else
            echo "❌ OP_RETURN data does not match GitHub username."
            exit 1
          fi
